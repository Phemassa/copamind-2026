name: Feature request
description: Sugerir uma melhoria ou novo recurso
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problema / motivação
      description: Qual necessidade essa feature atende?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposta
      description: Como você imagina a solução?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
