name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "apps/portal/**"
      - "pictures/icons/**"
      - "scripts/export_static_portal.py"

  # Permite disparar manualmente pela aba Actions
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas um deploy roda por vez
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Exportar portal para docs/portal/
        run: python scripts/export_static_portal.py

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Upload artefato Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
